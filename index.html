<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>User Management System</title>
    <style>
        body {
            font-family: Arial, sans-serif;
            margin: 20px;
            background-color: #f4f4f4;
        }
        h1 {
            text-align: center;
            color: #333;
        }
        .container {
            max-width: 800px;
            margin: 0 auto;
            background: white;
            padding: 20px;
            border-radius: 8px;
            box-shadow: 0 0 10px rgba(0,0,0,0.1);
        }
        form {
            margin-bottom: 20px;
        }
        label {
            display: block;
            margin-bottom: 5px;
            font-weight: bold;
        }
        input[type="text"], input[type="email"] {
            width: 100%;
            padding: 8px;
            margin-bottom: 10px;
            border: 1px solid #ddd;
            border-radius: 4px;
        }
        button {
            padding: 10px 15px;
            margin-right: 10px;
            border: none;
            border-radius: 4px;
            cursor: pointer;
        }
        .add-btn {
            background-color: #4CAF50;
            color: white;
        }
        .update-btn {
            background-color: #2196F3;
            color: white;
        }
        .cancel-btn {
            background-color: #f44336;
            color: white;
        }
        table {
            width: 100%;
            border-collapse: collapse;
            margin-top: 20px;
        }
        th, td {
            padding: 12px;
            text-align: left;
            border-bottom: 1px solid #ddd;
        }
        th {
            background-color: #f2f2f2;
        }
        .action-btn {
            padding: 5px 10px;
            margin-right: 5px;
            border: none;
            border-radius: 3px;
            cursor: pointer;
        }
        .edit-btn {
            background-color: #ff9800;
            color: white;
        }
        .delete-btn {
            background-color: #f44336;
            color: white;
        }
    </style>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
</head>
<body>
    <div class="container">
        <h1>User Management System</h1>
        
        <form id="userForm">
            <input type="hidden" id="userId">
            <label for="name">Name:</label>
            <input type="text" id="name" required>
            
            <label for="email">Email:</label>
            <input type="email" id="email" required>
            
            <button type="submit" class="add-btn" id="submitBtn">Add User</button>
            <button type="button" class="cancel-btn" id="cancelBtn" style="display: none;">Cancel</button>
        </form>
        
        <table id="userTable">
            <thead>
                <tr>
                    <th>Name</th>
                    <th>Email</th>
                    <th>Actions</th>
                </tr>
            </thead>
            <tbody id="userTableBody">
                <!-- Users will be displayed here -->
            </tbody>
        </table>
    </div>

    <script>
        // Initialize Supabase client
        const supabaseUrl = 'https://hhesettkzcbqslssmixr.supabase.co';
        const supabaseKey = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6ImhoZXNldHRremNicXNsc3NtaXhyIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzMzNTIzODIsImV4cCI6MjA4ODkyODM4Mn0.UAKIhpWgUaFpXcn6eHEnS0UeL_rvVcR1MgJHtgNhIuA';
        const supabase = window.supabase.createClient(supabaseUrl, supabaseKey);

        // Load users from Supabase
        async function loadUsers() {
            const { data, error } = await supabase
                .from('profiles')
                .select('*');
            if (error) {
                console.error('Error loading users:', error);
                return [];
            }
            return data || [];
        }

        // Display users in the table
        async function displayUsers() {
            const users = await loadUsers();
            const tbody = document.getElementById('userTableBody');
            tbody.innerHTML = '';
            
            users.forEach(user => {
                const row = document.createElement('tr');
                row.innerHTML = `
                    <td>${user.name}</td>
                    <td>${user.email}</td>
                    <td>
                        <button class="action-btn edit-btn" onclick="editUser(${user.id})">Edit</button>
                        <button class="action-btn delete-btn" onclick="deleteUser(${user.id})">Delete</button>
                    </td>
                `;
                tbody.appendChild(row);
            });
        }

        // Add or update user
        document.getElementById('userForm').addEventListener('submit', async function(e) {
            e.preventDefault();
            const id = document.getElementById('userId').value;
            const name = document.getElementById('name').value;
            const email = document.getElementById('email').value;
            
            try {
                if (id) {
                    // Update existing user
                    const { error } = await supabase
                        .from('profiles')
                        .update({ name, email })
                        .eq('id', id);
                    if (error) throw error;
                } else {
                    // Add new user
                    const { error } = await supabase
                        .from('profiles')
                        .insert([{ name, email }]);
                    if (error) throw error;
                }
                
                await displayUsers();
                resetForm();
            } catch (error) {
                console.error('Error saving user:', error);
                alert('Error saving user: ' + error.message);
            }
        });

        // Edit user
        async function editUser(id) {
            try {
                const { data, error } = await supabase
                    .from('profiles')
                    .select('*')
                    .eq('id', id)
                    .single();
                if (error) throw error;
                
                if (data) {
                    document.getElementById('userId').value = data.id;
                    document.getElementById('name').value = data.name;
                    document.getElementById('email').value = data.email;
                    document.getElementById('submitBtn').textContent = 'Update User';
                    document.getElementById('submitBtn').className = 'update-btn';
                    document.getElementById('cancelBtn').style.display = 'inline-block';
                }
            } catch (error) {
                console.error('Error loading user for edit:', error);
                alert('Error loading user: ' + error.message);
            }
        }

        // Delete user
        async function deleteUser(id) {
            if (confirm('Are you sure you want to delete this user?')) {
                try {
                    const { error } = await supabase
                        .from('profiles')
                        .delete()
                        .eq('id', id);
                    if (error) throw error;
                    
                    await displayUsers();
                } catch (error) {
                    console.error('Error deleting user:', error);
                    alert('Error deleting user: ' + error.message);
                }
            }
        }

        // Cancel edit
        document.getElementById('cancelBtn').addEventListener('click', resetForm);

        // Reset form
        function resetForm() {
            document.getElementById('userForm').reset();
            document.getElementById('userId').value = '';
            document.getElementById('submitBtn').textContent = 'Add User';
            document.getElementById('submitBtn').className = 'add-btn';
            document.getElementById('cancelBtn').style.display = 'none';
        }

        // Initial display
        displayUsers();
    </script>
</body>
</html>
